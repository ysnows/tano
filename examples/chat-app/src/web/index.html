<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Tano Chat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f7;
            color: #1d1d1f;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: #fff;
            border-bottom: 1px solid #e5e5e5;
            padding: 16px 20px;
            padding-top: max(16px, env(safe-area-inset-top));
            text-align: center;
        }

        header h1 {
            font-size: 1.1rem;
            font-weight: 600;
            color: #1d1d1f;
        }

        header p {
            font-size: 0.75rem;
            color: #86868b;
            margin-top: 2px;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .message.user {
            align-self: flex-end;
            background: #007AFF;
            color: #fff;
            border-bottom-right-radius: 6px;
        }

        .message.assistant {
            align-self: flex-start;
            background: #e9e9eb;
            color: #1d1d1f;
            border-bottom-left-radius: 6px;
        }

        .message.assistant.streaming {
            background: #e9e9eb;
        }

        .message .cursor {
            display: inline-block;
            width: 2px;
            height: 16px;
            background: #1d1d1f;
            margin-left: 2px;
            vertical-align: text-bottom;
            animation: blink 0.8s step-end infinite;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        .input-area {
            background: #fff;
            border-top: 1px solid #e5e5e5;
            padding: 12px 16px;
            padding-bottom: max(12px, env(safe-area-inset-bottom));
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .input-area textarea {
            flex: 1;
            padding: 10px 16px;
            border: 1px solid #d2d2d7;
            border-radius: 20px;
            font-size: 16px;
            font-family: inherit;
            resize: none;
            outline: none;
            max-height: 120px;
            line-height: 1.4;
            transition: border-color 0.2s;
        }

        .input-area textarea:focus {
            border-color: #007AFF;
        }

        .input-area button {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #007AFF;
            color: #fff;
            border: none;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.2s;
            flex-shrink: 0;
        }

        .input-area button:disabled {
            background: #c7c7cc;
            cursor: not-allowed;
        }

        .input-area button:active:not(:disabled) {
            opacity: 0.8;
        }

        .welcome {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #86868b;
            padding: 40px;
            text-align: center;
        }

        .welcome h2 {
            font-size: 1.5rem;
            color: #1d1d1f;
            margin-bottom: 8px;
        }

        .welcome p {
            font-size: 0.9rem;
            max-width: 320px;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <header>
        <h1>Tano Chat</h1>
        <p>SSE streaming from on-device Bun server</p>
    </header>

    <div class="messages" id="messages">
        <div class="welcome" id="welcome">
            <h2>Tano Chat</h2>
            <p>Send a message to see Server-Sent Events streaming in action. Each token arrives individually from the on-device Bun server.</p>
        </div>
    </div>

    <div class="input-area">
        <textarea
            id="chat-input"
            placeholder="Type a message..."
            rows="1"
        ></textarea>
        <button id="send-btn" onclick="sendMessage()">&#9650;</button>
    </div>

    <script>
        const messagesEl = document.getElementById('messages');
        const welcomeEl = document.getElementById('welcome');
        const inputEl = document.getElementById('chat-input');
        const sendBtn = document.getElementById('send-btn');

        let isStreaming = false;

        // Auto-resize textarea
        inputEl.addEventListener('input', () => {
            inputEl.style.height = 'auto';
            inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
        });

        // Enter to send (Shift+Enter for newline)
        inputEl.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        function addMessage(text, role) {
            if (welcomeEl) {
                welcomeEl.style.display = 'none';
            }

            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.textContent = text;
            messagesEl.appendChild(div);
            messagesEl.scrollTop = messagesEl.scrollHeight;
            return div;
        }

        function createStreamingMessage() {
            if (welcomeEl) {
                welcomeEl.style.display = 'none';
            }

            const div = document.createElement('div');
            div.className = 'message assistant streaming';
            div.innerHTML = '<span class="cursor"></span>';
            messagesEl.appendChild(div);
            messagesEl.scrollTop = messagesEl.scrollHeight;
            return div;
        }

        async function sendMessage() {
            const text = inputEl.value.trim();
            if (!text || isStreaming) return;

            isStreaming = true;
            sendBtn.disabled = true;

            // Show user message
            addMessage(text, 'user');
            inputEl.value = '';
            inputEl.style.height = 'auto';

            // Create streaming response bubble
            const responseDiv = createStreamingMessage();
            let responseText = '';

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });

                const reader = res.body.getReader();
                const decoder = new TextDecoder();

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value, { stream: true });
                    const lines = chunk.split('\n');

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const data = line.slice(6);
                            if (data === '[DONE]') {
                                // Remove cursor, finalize
                                responseDiv.classList.remove('streaming');
                                responseDiv.textContent = responseText;
                                break;
                            }

                            try {
                                const parsed = JSON.parse(data);
                                if (parsed.token) {
                                    responseText += parsed.token;
                                    responseDiv.innerHTML =
                                        escapeHtml(responseText) +
                                        '<span class="cursor"></span>';
                                    messagesEl.scrollTop = messagesEl.scrollHeight;
                                }
                            } catch (e) {
                                // skip malformed data
                            }
                        }
                    }
                }
            } catch (err) {
                console.error('Stream error:', err);
                responseDiv.classList.remove('streaming');
                responseDiv.textContent = 'Error: Could not connect to server.';
            }

            // Ensure final state
            responseDiv.classList.remove('streaming');
            if (responseText) {
                responseDiv.textContent = responseText;
            }

            isStreaming = false;
            sendBtn.disabled = false;
            inputEl.focus();
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }
    </script>
</body>
</html>
