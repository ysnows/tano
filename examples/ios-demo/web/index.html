<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Enconvo iOS</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,sans-serif; background:#f5f5f7; height:100vh; display:flex; flex-direction:column; }
.header { padding:12px 16px; background:white; border-bottom:1px solid #e5e5ea; }
.header h1 { font-size:17px; font-weight:600; }
.header .sub { font-size:12px; color:#8e8e93; margin-top:2px; }
.chat { flex:1; overflow-y:auto; padding:12px 16px; }
.msg { margin:8px 0; max-width:85%; padding:10px 14px; border-radius:16px; font-size:15px; line-height:1.4; word-wrap:break-word; white-space:pre-wrap; }
.msg.user { background:#007AFF; color:white; margin-left:auto; border-bottom-right-radius:4px; }
.msg.ai { background:white; color:#1c1c1e; border-bottom-left-radius:4px; box-shadow:0 1px 2px rgba(0,0,0,0.08); }
.msg.ai .model { font-size:11px; color:#8e8e93; margin-bottom:4px; }
.msg.system { background:#f2f2f7; color:#8e8e93; font-size:13px; text-align:center; margin:4px auto; max-width:90%; border-radius:8px; }
.input-bar { padding:8px 12px; background:white; border-top:1px solid #e5e5ea; display:flex; gap:8px; }
.input-bar textarea { flex:1; border:1px solid #d1d1d6; border-radius:18px; padding:8px 14px; font-size:15px; resize:none; height:36px; max-height:100px; font-family:inherit; }
.input-bar button { width:36px; height:36px; border:none; border-radius:50%; background:#007AFF; color:white; font-size:18px; cursor:pointer; flex-shrink:0; }
.input-bar button:disabled { background:#d1d1d6; }
.tests { padding:8px 16px; display:flex; gap:6px; flex-wrap:wrap; }
.tests button { padding:6px 12px; border:1px solid #007AFF; border-radius:16px; background:white; color:#007AFF; font-size:13px; cursor:pointer; }
.tests button:active { background:#007AFF; color:white; }
.cursor { color:#007AFF; animation:blink 0.8s infinite; font-weight:bold; }
@keyframes blink { 0%,20%{opacity:.2} 50%{opacity:1} 80%,100%{opacity:.2} }
</style>
</head>
<body>

<div class="header" style="display:flex;align-items:center;justify-content:space-between;">
  <div>
    <h1>Enconvo iOS Demo</h1>
    <div class="sub" id="status">Connecting to Edge.js...</div>
  </div>
  <button onclick="newChat()" style="padding:6px 12px;border:1px solid #FF3B30;border-radius:16px;background:white;color:#FF3B30;font-size:13px;cursor:pointer;">New Chat</button>
</div>

<div class="tests">
  <button onclick="runTest('fs')">fs</button>
  <button onclick="runTest('crypto')">crypto</button>
  <button onclick="runTest('path')">path</button>
  <button onclick="runTest('buffer')">buffer</button>
  <button onclick="runTest('events')">events</button>
  <button onclick="runTest('dns')">dns</button>
  <button onclick="runTest('http')">http</button>
  <button onclick="runTest('uds')">uds</button>
  <button onclick="runTest('extensions')">ext</button>
  <button onclick="runTest('command')">cmd</button>
  <button onclick="runTest('llm')">llm</button>
  <button onclick="runTest('sqlite')">sqlite</button>
  <button onclick="runTest('info')">runtime</button>
</div>
<div class="tests">
  <button onclick="callNative('copy', {text:'Hello from WebView!'})">copy</button>
  <button onclick="callNative('getLatestClipboard', {})">paste</button>
  <button onclick="callNative('hapticFeedback', {style:'medium'})">haptic</button>
  <button onclick="callNative('showToast', {title:'Test',message:'Native toast!'})">toast</button>
  <button onclick="setApiKey()" style="background:#FF9500;color:white;border-color:#FF9500">API Key</button>
</div>

<div class="chat" id="chat"></div>

<div class="input-bar">
  <textarea id="input" placeholder="Ask anything..." rows="1"
    oninput="this.style.height='36px';this.style.height=Math.min(this.scrollHeight,100)+'px'"></textarea>
  <button id="sendBtn" onclick="sendMessage()">↑</button>
</div>

<script>
const chat = document.getElementById('chat');
const input = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');

// Edge.js local server
const API = 'http://127.0.0.1:18899';
let apiKey = '';
let conversationHistory = []; // Maintains chat context

function addMsg(text, type, model) {
  const div = document.createElement('div');
  div.className = 'msg ' + type;
  if (type === 'ai' && model) div.innerHTML = '<div class="model">' + esc(model) + '</div>' + esc(text);
  else div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// === Connect to Edge.js ===
async function connectToEdge() {
  for (let i = 0; i < 30; i++) {
    try {
      const r = await fetch(API + '/api/info');
      const d = await r.json();
      document.getElementById('status').textContent =
        'Edge.js ' + d.version + ' | ' + d.engine + ' | UDS: ' + (d.uds ? 'connected' : 'waiting');
      return true;
    } catch {
      await new Promise(r => setTimeout(r, 1000));
    }
  }
  document.getElementById('status').textContent = 'Failed to connect to Edge.js';
  return false;
}

// === Send Chat Message (SSE streaming) ===
async function sendMessage() {
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  input.style.height = '36px';
  sendBtn.disabled = true;

  addMsg(text, 'user');
  conversationHistory.push({ role: 'user', content: text });

  // Create streaming AI bubble
  const bubble = document.createElement('div');
  bubble.className = 'msg ai';
  bubble.innerHTML = '<div class="model">...</div><span class="stream-text"></span><span class="cursor">▌</span>';
  chat.appendChild(bubble);
  chat.scrollTop = chat.scrollHeight;

  try {
    const res = await fetch(API + '/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt: text, messages: conversationHistory, apiKey, stream: true })
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let fullContent = '';
    let model = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      const chunk = decoder.decode(value, { stream: true });
      const lines = chunk.split('\n').filter(l => l.startsWith('data: '));

      for (const line of lines) {
        const data = line.slice(6);
        if (data === '[DONE]') continue;
        try {
          const parsed = JSON.parse(data);
          if (!model && parsed.model) {
            model = parsed.model;
            bubble.querySelector('.model').textContent = model;
          }
          const delta = parsed.choices?.[0]?.delta?.content || '';
          if (delta) {
            fullContent += delta;
            bubble.querySelector('.stream-text').textContent = fullContent;
            chat.scrollTop = chat.scrollHeight;
          }
        } catch {}
      }
    }
  } catch (e) {
    bubble.querySelector('.stream-text').textContent = 'Error: ' + e.message;
  }

  // Save assistant response to conversation history
  const streamText = bubble.querySelector('.stream-text');
  if (streamText && streamText.textContent) {
    conversationHistory.push({ role: 'assistant', content: streamText.textContent });
  }

  // Remove cursor
  const cur = bubble.querySelector('.cursor');
  if (cur) cur.remove();
  sendBtn.disabled = false;
}

// === Run Node.js Test ===
async function runTest(name) {
  addMsg('Testing ' + name + '...', 'system');
  try {
    const r = await fetch(API + '/api/test', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name })
    });
    const d = await r.json();
    addMsg(d.result || JSON.stringify(d), 'system');
  } catch (e) {
    addMsg('Error: ' + e.message, 'system');
  }
}

// Enter to send
input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

// Set API key — saves to preferences for persistence
async function setApiKey() {
  const key = prompt('Enter API Key (Groq/OpenAI):', apiKey);
  if (!key) return;
  apiKey = key;
  // Save to preferences
  try {
    await fetch(API + '/api/preferences', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ commandKey: 'llm_ios|chat', action: 'set', name: 'api_key', value: key })
    });
    addMsg('API key saved', 'system');
  } catch (e) {
    addMsg('API key set (not saved: ' + e.message + ')', 'system');
  }
}

// Load saved API key on startup
async function loadSavedKey() {
  try {
    const r = await fetch(API + '/api/preferences', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ commandKey: 'llm_ios|chat' })
    });
    const d = await r.json();
    if (d.api_key) { apiKey = d.api_key; }
  } catch (e) {}
}

// Call native Swift function via EnconvoBridge (WKScriptMessageHandler)
async function callNative(method, data) {
  if (window.EnconvoBridge) {
    addMsg('Native: ' + method + '(' + JSON.stringify(data) + ')', 'system');
    window.EnconvoBridge.callNative(method, data);
  } else {
    // Fallback: call via HTTP → Node.js → UDS → Swift
    try {
      const r = await fetch(API + '/api/native', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ method, payloads: data })
      });
      const d = await r.json();
      addMsg('Native result: ' + JSON.stringify(d), 'system');
    } catch (e) {
      addMsg('Native error: ' + e.message, 'system');
    }
  }
}

// Handle messages from Swift via EnconvoBridge
window.onEnconvoMessage = function(event, data) {
  if (event === 'nativeResult') {
    const summary = data.content || data.value || (data.error ? 'Error: ' + data.error : JSON.stringify(data));
    addMsg('← ' + summary, 'system');
  }
};

// New Chat — clear history and UI
function newChat() {
  conversationHistory = [];
  chat.innerHTML = '';
  addMsg('New conversation started', 'system');
}

// Init
connectToEdge().then(() => loadSavedKey());
</script>
</body>
</html>
