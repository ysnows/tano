<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>iOS Terminal</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'SF Mono','Menlo','Courier New',monospace; background:#1e1e1e; color:#d4d4d4; height:100vh; display:flex; flex-direction:column; }
#output { flex:1; overflow-y:auto; padding:8px; font-size:13px; line-height:1.5; white-space:pre-wrap; word-break:break-all; }
.prompt { color:#4ec9b0; }
.cmd { color:#dcdcaa; }
.error { color:#f44747; }
.dir { color:#569cd6; font-weight:bold; }
.info { color:#608b4e; }
.input-bar { display:flex; padding:4px 8px; background:#252526; border-top:1px solid #333; }
.input-bar .ps1 { color:#4ec9b0; font-size:13px; padding:8px 4px 8px 0; white-space:nowrap; }
.input-bar input { flex:1; background:transparent; border:none; color:#d4d4d4; font-family:inherit; font-size:13px; outline:none; padding:8px 4px; }
</style>
</head>
<body>
<div id="output"></div>
<div class="input-bar">
  <span class="ps1" id="ps1">~ $</span>
  <input id="cmd" type="text" autocapitalize="none" autocorrect="off" spellcheck="false" autofocus>
</div>

<script>
const API = 'http://127.0.0.1:18899';
const output = document.getElementById('output');
const cmdInput = document.getElementById('cmd');
const ps1 = document.getElementById('ps1');
const history = [];
let historyIdx = -1;

function appendOutput(html) {
  output.innerHTML += html;
  output.scrollTop = output.scrollHeight;
}

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

async function runCommand(cmd) {
  if (!cmd.trim()) return;
  history.unshift(cmd);
  historyIdx = -1;

  const currentPs1 = ps1.textContent;
  appendOutput(`<span class="prompt">${escHtml(currentPs1)}</span> <span class="cmd">${escHtml(cmd)}</span>\n`);

  if (cmd.trim() === 'clear') {
    output.innerHTML = '';
    return;
  }

  try {
    const r = await fetch(API + '/api/shell', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ command: cmd })
    });
    const d = await r.json();

    if (d.output) {
      const isError = d.output.includes(': ') && (d.output.startsWith('ls:') || d.output.startsWith('cd:') || d.output.startsWith('cat:') || d.output.includes('not found') || d.output.includes('Error'));
      appendOutput(`<span class="${isError ? 'error' : ''}">${escHtml(d.output)}</span>\n`);
    }

    // Update prompt with current directory
    if (d.cwd) {
      const short = d.cwd.replace(new RegExp('^' + (process?.env?.HOME || '/root')), '~')
                        .replace(/.*\/Containers\/Data\/Application\/[^/]+/, '~');
      ps1.textContent = short + ' $';
    }
  } catch (e) {
    appendOutput(`<span class="error">Error: ${escHtml(e.message)}</span>\n`);
  }
}

cmdInput.addEventListener('keydown', async (e) => {
  if (e.key === 'Enter') {
    const cmd = cmdInput.value;
    cmdInput.value = '';
    await runCommand(cmd);
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (historyIdx < history.length - 1) {
      historyIdx++;
      cmdInput.value = history[historyIdx];
    }
  } else if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (historyIdx > 0) {
      historyIdx--;
      cmdInput.value = history[historyIdx];
    } else {
      historyIdx = -1;
      cmdInput.value = '';
    }
  }
});

// Welcome message
appendOutput('<span class="info">iOS Terminal — EdgeJS Shell v1.0</span>\n');
appendOutput('<span class="info">Type "help" for available commands.\n</span>\n');

// Get initial cwd
fetch(API + '/api/shell', {
  method: 'POST',
  headers: { 'Content-Type': 'application/json' },
  body: JSON.stringify({ command: 'pwd' })
}).then(r => r.json()).then(d => {
  if (d.cwd) {
    const short = d.cwd.replace(/.*\/Containers\/Data\/Application\/[^/]+/, '~');
    ps1.textContent = short + ' $';
  }
}).catch(() => {});

cmdInput.focus();
</script>
</body>
</html>
