<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>{{APP_NAME}}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            padding-top: env(safe-area-inset-top, 24px);
            padding-bottom: env(safe-area-inset-bottom, 24px);
        }

        .container {
            text-align: center;
            max-width: 400px;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 1rem;
            opacity: 0.85;
            margin-bottom: 32px;
        }

        .card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
        }

        .card h2 {
            font-size: 1.1rem;
            margin-bottom: 12px;
        }

        #api-response {
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 0.85rem;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            padding: 12px;
            text-align: left;
            white-space: pre-wrap;
            word-break: break-all;
        }

        button {
            background: #fff;
            color: #764ba2;
            border: none;
            border-radius: 12px;
            padding: 14px 28px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s ease, opacity 0.2s ease;
        }

        button:active {
            transform: scale(0.96);
            opacity: 0.9;
        }

        .footer {
            margin-top: 32px;
            font-size: 0.8rem;
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>{{APP_NAME}}</h1>
        <p class="subtitle">Powered by Tano</p>

        <div class="card">
            <h2>Server Response</h2>
            <div id="api-response">Loading...</div>
        </div>

        <button onclick="fetchHello()">Call /api/hello</button>

        <p class="footer">Edit src/web/index.html to get started</p>
    </div>

    <script>
        async function fetchHello() {
            const el = document.getElementById('api-response');
            try {
                el.textContent = 'Fetching...';
                const res = await fetch('/api/hello');
                const data = await res.json();
                el.textContent = JSON.stringify(data, null, 2);
            } catch (err) {
                el.textContent = 'Error: ' + err.message;
            }
        }

        // Fetch on load
        fetchHello();
    </script>
</body>
</html>
