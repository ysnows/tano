  build-wasix-linux:
    name: build-wasix-linux
    runs-on: ubuntu-latest
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: sccache
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install wasixcc
        uses: wasix-org/wasixcc@v0.4.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          sysroot-tag: v2026-02-16.1
          version: v0.4.2

      - name: Install wasm-tools
        run: |
          cargo install --locked wasm-tools

      - name: Build edge (WASIX)
        shell: bash
        run: |
          set -euo pipefail
          ./wasix/build-wasix.sh

      - name: Generate dist
        shell: bash
        run: |
          set -euo pipefail
          make dist-only BUILD_DIR=build-wasix JOBS=4 ZIP_NAME=edge-wasix.zip

      - name: Upload artifact edge
        uses: actions/upload-artifact@v4
        with:
          name: edge-wasix
          path: edge-wasix.zip
          if-no-files-found: error

      - name: sccache stats
        if: always()
        run: sccache --show-stats || true
